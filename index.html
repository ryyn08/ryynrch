<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYYN 404 • React Channel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-deep: #030014;
            --bg-card: rgba(17, 25, 40, 0.75);
            --border-light: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(124, 58, 237, 0.5);
            --primary: #8b5cf6;  
            --secondary: #06b6d4;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --font-head: 'Space Grotesk', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --glass-blur: blur(16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            min-height: 100vh;
            font-size: 0.8rem;
        }

        /* Background Effects */
        .bg-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(to bottom, #030014, #0f0728); }
        .cyber-grid {
            position: fixed; width: 200%; height: 200%; top: -50%; left: -50%; z-index: -1;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; transform: perspective(500px) rotateX(60deg); animation: gridMove 20s linear infinite; opacity: 0.35;
        }
        @keyframes gridMove { 100% { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

        /* Navbar */
        nav {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 850px; padding: 8px 18px;
            background: rgba(10, 10, 15, 0.6); backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-light); border-radius: 100px;
            display: flex; justify-content: space-between; align-items: center; z-index: 999;
        }
        .brand { font-family: var(--font-head); font-weight: 700; font-size: 1.05rem; }
        .brand span { color: var(--primary); }

        .status-widget {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 12px; background: rgba(255,255,255,0.05);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 8px #4ade80; animation: pulse 1.5s infinite; }
        .dot.cd { background: #f87171; box-shadow: 0 0 8px #f87171; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .status-text { font-size: 0.65rem; font-weight: 700; font-family: 'Space Grotesk'; text-transform: uppercase; letter-spacing: 0.5px; }

        header { padding: 110px 20px 25px; text-align: center; max-width: 700px; margin: 0 auto; }
        .badge-pill {
            display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 50px;
            background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.2);
            font-size: 0.65rem; color: #d8b4fe; margin-bottom: 12px;
        }
        h1 { font-family: var(--font-head); font-size: 2.1rem; margin-bottom: 10px; background: linear-gradient(180deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2; }
        header p { font-size: 0.78rem; }

        .main-container { max-width: 440px; margin: 0 auto; padding: 15px; }
        .card {
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: 18px; padding: 22px; backdrop-filter: var(--glass-blur);
        }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
        .input-group input {
            width: 100%; padding: 10px 15px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-light); border-radius: 10px; color: white;
            font-size: 0.8rem; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 12px rgba(139, 92, 246, 0.2); }

        .btn-submit {
            width: 100%; padding: 11px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, var(--primary), #6d28d9);
            color: white; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .btn-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }

        footer { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="bg-fixed"></div>
    <div class="cyber-grid"></div>

    <nav>
        <div class="brand">RYYN<span> 404</span></div>
        <div class="status-widget">
            <div class="dot" id="statusDot"></div>
            <span class="status-text" id="statusLabel">SERVER : ACTIVE</span>
        </div>
    </nav>

    <header>
        <div class="badge-pill">
            <i class="fas fa-bolt"></i>
            <span>RYYN 404 AUTOMATION</span>
        </div>
        <h1>Whatsapp Channel<br>React pesan</h1>
        <p style="color: var(--text-muted);">Masukan link pesan channel dan emoji menggunakan pemisah koma untuk memberikan reaksi otomatis.</p>
    </header>

    <div class="main-container">
        <div class="card">
            <div class="input-group">
                <label><i class="fas fa-link"></i> URL PESAN CHANNEL</label>
                <input type="text" id="urlInput" placeholder="https://whatsapp.com/channel/xxx/123">
            </div>
            <div class="input-group">
                <label><i class="fas fa-face-smile"></i> EMOJI REAKSI (GUNAKAN KOMA)</label>
                <input type="text" id="reactInput" placeholder="contoh: 😮,🥰,😂">
            </div>

            <button type="button" class="btn-submit" id="submitBtn" onclick="processReact()">
                <i class="fas fa-paper-plane"></i> KIRIM REAKSI
            </button>
        </div>
    </div>

    <footer>
        &copy; 2026 <strong>RYYN 404</strong> • All Rights Reserved.
    </footer>

    <script>
        const COOLDOWN_TIME = 10 * 60 * 1000; // 10 Menit
        const MAX_LIMIT = 5; // Maksimal 5x sehari
        const TELEGRAM_TOKEN = "8272585724:AAEDXLqT3k7SzTRkEjH-HALWioVmgr_orvg";
        const OWNER_ID = "7246739496";

        // Fungsi mencatat & mereset limit harian di Jam 00:00 WIB menggunakan LocalStorage
        function checkDailyLimitReset() {
            const today = new Date().toLocaleDateString('id-ID', { timeZone: 'Asia/Jakarta' });
            const savedDate = localStorage.getItem('react_date');
            
            if (savedDate !== today) {
                localStorage.setItem('react_date', today);
                localStorage.setItem('react_usage_count', '0');
            }
        }

        function updateClock() {
            checkDailyLimitReset();
            const nextUse = localStorage.getItem('react_cooldown');
            const statusLabel = document.getElementById('statusLabel');
            const statusDot = document.getElementById('statusDot');
            const submitBtn = document.getElementById('submitBtn');
            const usageCount = parseInt(localStorage.getItem('react_usage_count') || '0');
            
            if (usageCount >= MAX_LIMIT) {
                statusLabel.innerHTML = "LIMIT HABIS (MAX 5x)";
                statusDot.classList.add('cd');
                submitBtn.disabled = true;
                return;
            }

            if (nextUse) {
                const remaining = nextUse - Date.now();
                if (remaining > 0) {
                    const mins = Math.floor(remaining / 60000);
                    const secs = Math.floor((remaining % 60000) / 1000);
                    statusLabel.innerHTML = `COOLDOWN : ${mins}:${secs < 10 ? '0'+secs : secs}`;
                    statusDot.classList.add('cd');
                    submitBtn.disabled = true;
                    return;
                }
            }
            statusLabel.innerHTML = "SERVER : ACTIVE";
            statusDot.classList.remove('cd');
            submitBtn.disabled = false;
        }

        setInterval(updateClock, 1000);
        window.onload = updateClock;

        async function processReact() {
            checkDailyLimitReset();
            const url = document.getElementById('urlInput').value.trim();
            const react = document.getElementById('reactInput').value.trim();
            const btn = document.getElementById('submitBtn');

            if (!url || !react) {
                alert("Harap isi semua kolom!");
                return;
            }

            // --- VALIDASI EMOJI KOMA ---
            // Regex mendeteksi jika ada emoji yang berdempetan tanpa jeda koma
            const emojiRegex = /[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}][\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}]/u;
            if (emojiRegex.test(react)) {
                alert("PERINGATAN! Input emoji salah. Format harus dipisah menggunakan koma yang bener.\n\nContoh Salah: 😂🥰😮\nContoh Benar: 😮,🥰,😂");
                return;
            }

            // Cek batasan limit harian sebelum kirim
            const currentUsage = parseInt(localStorage.getItem('react_usage_count') || '0');
            if (currentUsage >= MAX_LIMIT) {
                alert("Akses Ditolak! Kamu sudah mencapai batasan harian (Maksimal 5x dalam 1 hari). Limit akan di-reset otomatis pada jam 00:00 WIB.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMPROSES...';

            try {
                // Tembak langsung API Target via Fetch
                const response = await fetch(`https://api-faa.my.id/faa/react-channel?url=${encodeURIComponent(url)}&react=${encodeURIComponent(react)}`);
                
                // Menghitung Sisa Limit & Cooldown jika sukses
                const nextTime = Date.now() + COOLDOWN_TIME;
                localStorage.setItem('react_cooldown', nextTime);
                localStorage.setItem('react_usage_count', (currentUsage + 1).toString());

                const dateNext = new Date(nextTime);
                const timeString = dateNext.getHours().toString().padStart(2, '0') + ":" + dateNext.getMinutes().toString().padStart(2, '0');

                // Dapatkan IP User untuk Log laporan Telegram
                let userIp = "Unknown";
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    userIp = ipData.ip;
                } catch(e){}

                const currentTime = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });
                
                // Kirim laporan ke Bot Telegram
                const message = `HI SIR THERE IS A NEW MESSAGE\n\n` +
                                `IP : ${userIp}\n` +
                                `LINK CH : ${url}\n` +
                                `REAKSI EMOJI : ${react}\n` +
                                `SISA LIMIT HARI INI : ${MAX_LIMIT - (currentUsage + 1)}\n` +
                                `AKTIF KEMBALI : ${timeString} WIB\n` +
                                `WAKTU : ${currentTime}`;

                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: OWNER_ID, text: message })
                });

                alert(`REAKSI TERKIRIM!\nSukses memberikan react [${react}].\nKamu bisa menggunakan alat ini lagi pada jam: ${timeString} WIB.`);

            } catch (err) {
                alert("GAGAL!\nTerjadi kesalahan koneksi atau API target sedang down.");
            } finally {
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> KIRIM REAKSI';
                updateClock();
            }
        }
    </script>
</body>
</html>
